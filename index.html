<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Hành tinh kỷ niệm ❤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Three.js canvas -->
  <canvas id="threeCanvas"></canvas>

  <!-- ── INTRO OVERLAY ── -->
  <div id="intro-screen" class="ui-screen active">
    <div class="intro-inner">

      <!-- Dòng trên: label nhỏ -->
      <p class="intro-eyebrow">✦ Dành tặng em yêu ✦</p>

      <!-- Dải sáng -->
      <div class="intro-rule"></div>

      <!-- Dòng chính -->
      <p class="intro-greeting">Chúc mừng</p>
      <h1 class="intro-title">
        <em>Ngày Quốc tế</em>
        <span>Thiếu Nhi</span>
      </h1>

      <!-- Ngày tháng -->
      <div class="intro-date-row">
        <span class="intro-dash"></span>
        <span class="intro-date">1 · 6 · 2025</span>
        <span class="intro-dash"></span>
      </div>

      <!-- Nút -->
      <button class="pill-btn" id="introBtn">
        <span>Khám phá ngay</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </button>

    </div>
    <div class="vignette"></div>
  </div>

  <!-- ── SPHERE UI (hiển thị khi đang xem quả cầu) ── -->
  <div id="sphere-ui" class="ui-screen">
    <div class="film-title">
      <span class="film-main">Kỷ niệm của chúng mình</span>
      <span class="film-sub">Chạm vào ảnh để xem · Kéo để xoay</span>
    </div>
    <button class="music-btn" id="musicBtn" aria-label="Nhạc">
      <svg id="iconMusic" viewBox="0 0 24 24" fill="currentColor"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <svg id="iconMute"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none"><line x1="2" y1="2" x2="22" y2="22"/><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    </button>
    <!-- Nút đặc biệt cuối -->
    <button class="special-btn" id="specialBtn">Điều đặc biệt cuối cùng ❤️</button>
  </div>

  <!-- ── LIGHTBOX (xem ảnh toàn màn hình) ── -->
  <div id="lightbox" class="ui-screen">
    <div class="lb-backdrop"></div>
    <div class="lb-frame">
      <img id="lbImg" src="" alt="" />
      <div class="lb-caption" id="lbCaption"></div>
    </div>
    <button class="lb-close" id="lbClose">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <button class="lb-nav lb-prev" id="lbPrev">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button class="lb-nav lb-next" id="lbNext">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18l6-6-6-6"/></svg>
    </button>
    <div class="lb-counter" id="lbCounter"></div>
    <div class="vignette dark"></div>
  </div>

  <!-- ── ENDING SCREEN ── -->
  <div id="ending-screen" class="ui-screen">
    <canvas id="endingCanvas"></canvas>
    <div class="ending-wrap">
      <div class="ending-heart" id="endingHeart">
        <svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="hg" x1="0" y1="0" x2="100" y2="90" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#f0a0b8"/>
              <stop offset="100%" stop-color="#d4607a"/>
            </linearGradient>
          </defs>
          <path d="M50 85 C50 85 5 55 5 28 C5 14 16 5 28 5 C37 5 45 10 50 18 C55 10 63 5 72 5 C84 5 95 14 95 28 C95 55 50 85 50 85Z" fill="url(#hg)"/>
        </svg>
      </div>
      <div class="ending-message" id="endingMessage"></div>
      <button class="pill-btn replay-btn" id="replayBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
        <span>Xem lại từ đầu</span>
      </button>
    </div>
    <div class="vignette dark"></div>
  </div>

  <!-- Nhạc nền -->
  <audio id="bgMusic" loop>
    <source src="music/background.mp3" type="audio/mpeg" />
  </audio>

  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
